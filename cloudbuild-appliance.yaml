# Build + publish the Sailfish appliance image to Docker Hub as deepbluedynamics/sailfish.
# Mirrors grubcrawler's Docker Hub publish (dockerhub-token in Secret Manager).
#
#   gcloud builds submit --config cloudbuild-appliance.yaml --project gnosis-459403 \
#     --substitutions=_SHA=$(git rev-parse --short HEAD) --timeout=3600s
#
# Build context is the REPO ROOT (the image COPYs app/, site/, container/entrypoint.sh).
# Needs a machine with disk — the llama.cpp CUDA base is multi-GB; use a bigger pool if it OOMs.
substitutions:
  _IMAGE: docker.io/deepbluedynamics/sailfish
  _SHA: dev

availableSecrets:
  secretManager:
    - versionName: projects/gnosis-459403/secrets/dockerhub-token/versions/latest
      env: DOCKERHUB_TOKEN

steps:
  - id: login
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    secretEnv: [DOCKERHUB_TOKEN]
    args:
      - -c
      - echo "$$DOCKERHUB_TOKEN" | docker login -u deepbluedynamics --password-stdin

  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - container/Dockerfile
      - -t
      - ${_IMAGE}:latest
      - -t
      - ${_IMAGE}:${_SHA}
      - .

  - id: push-latest
    name: 'gcr.io/cloud-builders/docker'
    args: [push, '${_IMAGE}:latest']
  - id: push-sha
    name: 'gcr.io/cloud-builders/docker'
    args: [push, '${_IMAGE}:${_SHA}']

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY
timeout: 3600s
